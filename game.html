<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dosecraft · Playing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030812;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-y: auto;
    }
  </style>
<script>
  // ── AUDIO (Web Audio API — handles rapid-fire plays correctly) ────────────
  const SFX = (() => {
    let ctx = null;
    const buffers = {};

    function getCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    async function load(name, src) {
      try {
        const res = await fetch(src);
        const raw = await res.arrayBuffer();
        const ac = getCtx();
        buffers[name] = await ac.decodeAudioData(raw);
      } catch (e) {
        console.warn('SFX load failed:', name, e);
      }
    }

    function play(name) {
      const buf = buffers[name];
      if (!buf) return;
      const ac = getCtx();
      const src = ac.createBufferSource();
      src.buffer = buf;
      const gain = ac.createGain();
      gain.gain.value = 0.65;
      src.connect(gain);
      gain.connect(ac.destination);
      src.start(0);
    }

    return { load, play };
  })();

  window.addEventListener('DOMContentLoaded', () => {
    SFX.load('beta_wall_hit',   'audio/beta_wall_hit.webm');
    SFX.load('dapto_collect',   'audio/dapto_collect.webm');
    SFX.load('level_complete',  'audio/level_complete.wav');
    SFX.load('vanco_intercept', 'audio/vanco_intercept.webm');
    SFX.load('wall_destroyed',  'audio/wall_destroyed.wav');
    SFX.load('wall_hit',        'audio/wall_hit.wav');
  });
</script>
  <!-- React + ReactDOM via CDN (production builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone so JSX works without a build step -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ── HOOKS (available globally via React CDN) ──────────────────────────────
    const { useState, useEffect, useRef, useCallback } = React;

    // ── URL PARAM: read which drug was selected on the homepage ───────────────
    function getDrugNameFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('drug') || null;
    }
  </script>

  <!--
    InfusionArcade.js is the single source of truth for the game.
    Edit only that file — game.html just loads and mounts it.

    Note: Babel processes both script blocks as a combined bundle,
    so the hooks declared above are available inside InfusionArcade.js.
    Both scripts must be type="text/babel" for this to work.
  -->
  <script type="text/babel" src="InfusionArcade.js"></script>

  <script type="text/babel">
    // ── MOUNT ─────────────────────────────────────────────────────────────────
    function App() {
      const drugName = getDrugNameFromURL();
      return <InfusionArcade initialDrug={drugName} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
