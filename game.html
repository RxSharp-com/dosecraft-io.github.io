<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!--
    PWA / mobile viewport
    • viewport-fit=cover: extends into iPhone notch / Dynamic Island
    • user-scalable=no: prevents pinch-zoom from accidentally resizing the canvas
    • maximum-scale=1.0: belt-and-suspenders for older iOS WebKit
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>Dosecraft · Playing</title>

  <!-- ── PWA: manifest ──────────────────────────────────────────────────────
       manifest.json lives at the repo root (same level as game.html).
       It sets display:standalone, start_url:/game.html, theme/background.
  -->
  <link rel="manifest" href="/manifest.json" />

  <!-- ── PWA: iOS / Safari "Add to Home Screen" support ────────────────────
       Safari does not read manifest icons — these tags are required separately.
       mobile-web-app-capable (without "apple-") is the current standard.
       apple-mobile-web-app-capable still works but is deprecated as of iOS 17.
       black-translucent status bar extends the dark background behind the
       system status bar for a full-bleed look on iPhone.
  -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Infusion Arcade" />
  <link rel="apple-touch-icon" href="/icon-192x192.png" />

  <!-- ── PWA: Android Chrome toolbar / task-switcher tint ─────────────────
       Matches the dark navy used throughout the UI.
  -->
  <meta name="theme-color" content="#030812" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /*
      Scroll-lock for the game page.
      • position:fixed + overflow:hidden on html/body stops iOS bounce-scroll
        and Android pull-to-refresh from firing during gameplay swipes.
      • The React root (#root) is allowed to overflow internally so that
        the companion strip and buttons below the canvas remain reachable
        by the user scrolling within the app, not the browser page.
      • overscroll-behavior:none is the CSS-only guard; the JS MutationObserver
        below adds touch-action:none directly to every <canvas> element so
        that pointer events inside the game area are never intercepted by the
        browser scroll handler.
    */
    html, body {
      overscroll-behavior: none;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      /* safe-area-inset accounts for iPhone notch / home bar */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    #root {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /*
      game-active: applied to <body> only while screen === "playing".
      Prevents page scroll and pull-to-refresh during gameplay touch drags.
      Removed automatically on all other screens so menus/companion can scroll.
    */
    body.game-active {
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      background: #030812;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
<script>
  // ── AUDIO (Web Audio API — handles rapid-fire plays correctly) ────────────
  const SFX = (() => {
    let ctx = null;
    const buffers = {};

    function getCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    async function load(name, src) {
      try {
        const res = await fetch(src);
        const raw = await res.arrayBuffer();
        const ac = getCtx();
        buffers[name] = await ac.decodeAudioData(raw);
      } catch (e) {
        console.warn('SFX load failed:', name, e);
      }
    }

    function play(name) {
      const buf = buffers[name];
      if (!buf) return;
      const ac = getCtx();
      const src = ac.createBufferSource();
      src.buffer = buf;
      const gain = ac.createGain();
      gain.gain.value = 0.65;
      src.connect(gain);
      gain.connect(ac.destination);
      src.start(0);
    }

    return { load, play };
  })();

  window.addEventListener('DOMContentLoaded', () => {
    SFX.load('beta_wall_hit',   'audio/beta_wall_hit.webm');
    SFX.load('dapto_collect',   'audio/dapto_collect.webm');
    SFX.load('level_complete',  'audio/level_complete.wav');
    SFX.load('vanco_intercept', 'audio/vanco_intercept.webm');
  window.addEventListener("error", function (e) {
  const overlay = document.getElementById("debug-overlay");
  if (overlay) {
    overlay.style.display = "block";
    overlay.innerText =
      "JS ERROR:\n" +
      e.message +
      "\n\nFile: " +
      (e.filename || "unknown") +
      "\nLine: " +
      (e.lineno || "unknown");
  }
});
    // wall_destroyed and wall_hit reserved — not wired to any game event yet
  });
</script>

<script>
  // ── MUSIC MANAGER ─────────────────────────────────────────────────────────
  // Uses HTMLAudioElement for looping background music.
  // Tracks ALL live elements in a Set to prevent stacking on rapid transitions.
  const MUSIC = (() => {
    const TRACKS = {
      menu:      { ogg: 'audio/menu_loop_soft_arcade.ogg',        mp3: 'audio/menu_loop_soft_arcade.mp3' },
      intro:     { ogg: 'audio/intro_loop_micro_mission.ogg',     mp3: 'audio/intro_loop_micro_mission.mp3' },
      companion: { ogg: 'audio/companion_loop_infusion_calm.ogg', mp3: 'audio/companion_loop_infusion_calm.mp3' },
    };

    const VOLUME       = 0.28;
    const FADE_STEP_MS = 60;
    const FADE_STEPS   = 14;

    // ALL live audio elements tracked here — prevents anything playing undetected
    const liveEls = new Set();

    let currentEl  = null;
    let currentKey = null;
    let enabled    = true;
    let unlocked   = false;
    let pendingKey = null;  // track requested before first user gesture

    try {
      const saved = localStorage.getItem('dosecraftMusicEnabled');
      if (saved !== null) enabled = saved === 'true';
    } catch (e) {}

    // Stop and destroy every tracked element immediately — no callbacks, no races
    function _killAll() {
      liveEls.forEach(el => {
        try { el.pause(); el.src = ''; } catch(e) {}
      });
      liveEls.clear();
      currentEl  = null;
      currentKey = null;
    }

    function _makeEl(key) {
      const t = TRACKS[key];
      if (!t) return null;
      const el = document.createElement('audio');
      el.loop = true;
      el.volume = 0;
      const s1 = document.createElement('source'); s1.src = t.ogg; s1.type = 'audio/ogg';
      const s2 = document.createElement('source'); s2.src = t.mp3; s2.type = 'audio/mpeg';
      el.appendChild(s1);
      el.appendChild(s2);
      el.onerror = () => {};
      return el;
    }

    function _startTrack(key) {
      _killAll();  // always wipe everything before starting a new track

      const el = _makeEl(key);
      if (!el) return;

      currentEl  = el;
      currentKey = key;
      liveEls.add(el);

      const p = el.play();
      if (p && p.catch) p.catch(() => {});

      // Fade in without a shared timer — each element owns its own interval
      let step = 0;
      const timer = setInterval(() => {
        step++;
        el.volume = Math.min(VOLUME, (step / FADE_STEPS) * VOLUME);
        if (step >= FADE_STEPS) clearInterval(timer);
      }, FADE_STEP_MS);
    }

    function fadeToTrack(key) {
      if (!enabled) return;
      if (!unlocked) { pendingKey = key; return; }
      if (currentKey === key && currentEl && !currentEl.paused) return;
      _startTrack(key);
    }

    function unlockAudio() {
      if (unlocked) return;
      unlocked = true;
      if (enabled && pendingKey) {
        _startTrack(pendingKey);
        pendingKey = null;
      }
    }

    function stopMusic() {
      pendingKey = null;
      _killAll();
    }

    function setEnabled(val) {
      enabled = val;
      try { localStorage.setItem('dosecraftMusicEnabled', String(val)); } catch(e) {}
      if (!val) stopMusic();
    }

    function getEnabled() { return enabled; }

    return { unlockAudio, fadeToTrack, stopMusic, setEnabled, getEnabled };
  })();

  // Unlock on first interaction anywhere on the page
  ['click', 'touchstart', 'keydown'].forEach(evt =>
    document.addEventListener(evt, () => MUSIC.unlockAudio(), { once: true, passive: true })
  );
</script>

  <!-- React + ReactDOM via CDN (production builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone — pinned to 7.23.9 (known good, tested with this codebase).
       Do NOT remove the version pin. Unpinned @babel/standalone will auto-update
       to whatever unpkg considers "latest", which can break JSX compilation silently. -->
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ── HOOKS (available globally via React CDN) ──────────────────────────────
    const { useState, useEffect, useRef, useCallback } = React;

    // ── URL PARAM: read which drug was selected on the homepage ───────────────
    function getDrugNameFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('drug') || null;
    }
  </script>

  <!--
    InfusionArcade.js is the single source of truth for the game.
    Edit only that file — game.html just loads and mounts it.

    Note: Babel processes both script blocks as a combined bundle,
    so the hooks declared above are available inside InfusionArcade.js.
    Both scripts must be type="text/babel" for this to work.
  -->
  <script type="text/babel" src="InfusionArcade.js"></script>

  <script type="text/babel">
    // ── MOUNT ─────────────────────────────────────────────────────────────────
    function App() {
      const drugName = getDrugNameFromURL();
      return <InfusionArcade initialDrug={drugName} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!--
    ── SERVICE WORKER REGISTRATION ─────────────────────────────────────────────
    FILE INVOLVED: sw.js  (new file, repo root — same level as game.html)

    Why this is placed just before </body>:
      • Registering after the page loads (window 'load' event) avoids competing
        with React/Babel for network bandwidth on first paint.
      • The feature-detect + try/catch means the game works normally if sw.js
        is missing (e.g. first deploy before the file is committed to GitHub).

    COMPANION MODE TIMER SAFETY:
      The session timer (dc_startTime, dc_durationMins, dc_endTime) lives in
      localStorage and React state — not in any network request. A service
      worker only intercepts fetch() calls for static file bytes; it cannot
      read or write localStorage. Installing, updating, or even unregistering
      the SW cannot cause the infusion timer to reset.

    GITHUB PAGES NOTE:
      sw.js must be committed to the repo root. GitHub Pages and Netlify both
      serve it automatically with the correct Content-Type. No build step needed.
      If your repo is served from a subpath (e.g. rxsharp22.github.io/dosecraft/)
      instead of a custom domain, change '/sw.js' → '/dosecraft/sw.js' and
      scope '/' → '/dosecraft/' below AND in manifest.json's start_url/scope.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker
          .register('/sw.js', { scope: '/' })
          .then(function (reg) {
            console.log('[Dosecraft SW] Registered. Scope:', reg.scope);
          })
          .catch(function (err) {
            // Safe fallback — game continues normally without the SW.
            console.warn('[Dosecraft SW] Registration skipped:', err.message);
          });
      });
    }

    /*
      Canvas touch-action patch
      Adds touch-action:none to every <canvas> element so that iOS does not
      interpret in-game finger drags as page-scroll gestures (which would cause
      the paddle/controls to jerk or lose input).

      We run it once on DOMContentLoaded and again via MutationObserver so that
      canvases React mounts dynamically (new rounds, game resets) are also covered.
      This is display-only; it does not touch any game state or the timer.
    */
    document.addEventListener('DOMContentLoaded', function () {
      function patchCanvases() {
        document.querySelectorAll('canvas').forEach(function (c) {
          c.style.touchAction = 'none';
        });
      }
      patchCanvases();
      new MutationObserver(patchCanvases).observe(document.body, {
        childList: true,
        subtree: true
      });
    });
  </script>
  <div id="debug-overlay" style="
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.85);
  color: #ff4444;
  font-family: monospace;
  font-size: 12px;
  padding: 8px;
  z-index: 99999;
  display: none;
">
</div>
</body>
</html>
