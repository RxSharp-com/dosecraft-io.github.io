<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dosecraft · Playing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030812;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-y: auto;
    }
  </style>
<script>
  // ── AUDIO (Web Audio API — handles rapid-fire plays correctly) ────────────
  const SFX = (() => {
    let ctx = null;
    const buffers = {};

    function getCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    async function load(name, src) {
      try {
        const res = await fetch(src);
        const raw = await res.arrayBuffer();
        const ac = getCtx();
        buffers[name] = await ac.decodeAudioData(raw);
      } catch (e) {
        console.warn('SFX load failed:', name, e);
      }
    }

    function play(name) {
      const buf = buffers[name];
      if (!buf) return;
      const ac = getCtx();
      const src = ac.createBufferSource();
      src.buffer = buf;
      const gain = ac.createGain();
      gain.gain.value = 0.65;
      src.connect(gain);
      gain.connect(ac.destination);
      src.start(0);
    }

    return { load, play };
  })();

  window.addEventListener('DOMContentLoaded', () => {
    SFX.load('beta_wall_hit',   'audio/beta_wall_hit.webm');
    SFX.load('dapto_collect',   'audio/dapto_collect.webm');
    SFX.load('level_complete',  'audio/level_complete.wav');
    SFX.load('vanco_intercept', 'audio/vanco_intercept.webm');
    // wall_destroyed and wall_hit reserved — not wired to any game event yet
  });
</script>

<script>
  // ── MUSIC MANAGER ─────────────────────────────────────────────────────────
  // Uses HTMLAudioElement for looping background music.
  // Tracks ALL live elements in a Set to prevent stacking on rapid transitions.
  const MUSIC = (() => {
    const TRACKS = {
      menu:      { ogg: 'audio/menu_loop_soft_arcade.ogg',        mp3: 'audio/menu_loop_soft_arcade.mp3' },
      intro:     { ogg: 'audio/intro_loop_micro_mission.ogg',     mp3: 'audio/intro_loop_micro_mission.mp3' },
      companion: { ogg: 'audio/companion_loop_infusion_calm.ogg', mp3: 'audio/companion_loop_infusion_calm.mp3' },
    };

    const VOLUME       = 0.28;
    const FADE_STEP_MS = 60;
    const FADE_STEPS   = 14;

    // ALL live audio elements tracked here — prevents anything playing undetected
    const liveEls = new Set();

    let currentEl  = null;
    let currentKey = null;
    let enabled    = true;
    let unlocked   = false;
    let pendingKey = null;  // track requested before first user gesture

    try {
      const saved = localStorage.getItem('dosecraftMusicEnabled');
      if (saved !== null) enabled = saved === 'true';
    } catch (e) {}

    // Stop and destroy every tracked element immediately — no callbacks, no races
    function _killAll() {
      liveEls.forEach(el => {
        try { el.pause(); el.src = ''; } catch(e) {}
      });
      liveEls.clear();
      currentEl  = null;
      currentKey = null;
    }

    function _makeEl(key) {
      const t = TRACKS[key];
      if (!t) return null;
      const el = document.createElement('audio');
      el.loop = true;
      el.volume = 0;
      const s1 = document.createElement('source'); s1.src = t.ogg; s1.type = 'audio/ogg';
      const s2 = document.createElement('source'); s2.src = t.mp3; s2.type = 'audio/mpeg';
      el.appendChild(s1);
      el.appendChild(s2);
      el.onerror = () => {};
      return el;
    }

    function _startTrack(key) {
      _killAll();  // always wipe everything before starting a new track

      const el = _makeEl(key);
      if (!el) return;

      currentEl  = el;
      currentKey = key;
      liveEls.add(el);

      const p = el.play();
      if (p && p.catch) p.catch(() => {});

      // Fade in without a shared timer — each element owns its own interval
      let step = 0;
      const timer = setInterval(() => {
        step++;
        el.volume = Math.min(VOLUME, (step / FADE_STEPS) * VOLUME);
        if (step >= FADE_STEPS) clearInterval(timer);
      }, FADE_STEP_MS);
    }

    function fadeToTrack(key) {
      if (!enabled) return;
      if (!unlocked) { pendingKey = key; return; }
      if (currentKey === key && currentEl && !currentEl.paused) return;
      _startTrack(key);
    }

    function unlockAudio() {
      if (unlocked) return;
      unlocked = true;
      if (enabled && pendingKey) {
        _startTrack(pendingKey);
        pendingKey = null;
      }
    }

    function stopMusic() {
      pendingKey = null;
      _killAll();
    }

    function setEnabled(val) {
      enabled = val;
      try { localStorage.setItem('dosecraftMusicEnabled', String(val)); } catch(e) {}
      if (!val) stopMusic();
    }

    function getEnabled() { return enabled; }

    return { unlockAudio, fadeToTrack, stopMusic, setEnabled, getEnabled };
  })();

  // Unlock on first interaction anywhere on the page
  ['click', 'touchstart', 'keydown'].forEach(evt =>
    document.addEventListener(evt, () => MUSIC.unlockAudio(), { once: true, passive: true })
  );
</script>
  <!-- React + ReactDOM via CDN (production builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone so JSX works without a build step -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ── HOOKS (available globally via React CDN) ──────────────────────────────
    const { useState, useEffect, useRef, useCallback } = React;

    // ── URL PARAM: read which drug was selected on the homepage ───────────────
    function getDrugNameFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('drug') || null;
    }
  </script>

  <!--
    InfusionArcade.js is the single source of truth for the game.
    Edit only that file — game.html just loads and mounts it.

    Note: Babel processes both script blocks as a combined bundle,
    so the hooks declared above are available inside InfusionArcade.js.
    Both scripts must be type="text/babel" for this to work.
  -->
  <script type="text/babel" src="InfusionArcade.js"></script>

  <script type="text/babel">
    // ── MOUNT ─────────────────────────────────────────────────────────────────
    function App() {
      const drugName = getDrugNameFromURL();
      return <InfusionArcade initialDrug={drugName} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
