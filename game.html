<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dosecraft · Playing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030812;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-y: auto;
    }
  </style>
<script>
  const SFX = {
    _cache: {},
    _muted: false,

    load(name, src) {
      const audio = new Audio(src);
      audio.preload = 'auto';
      this._cache[name] = audio;
    },

    play(name) {
      if (this._muted) return;
      const src = this._cache[name];
      if (!src) return;
      // Clone so rapid-fire plays don't cut each other off
      const clone = src.cloneNode();
      clone.volume = 0.6;
      clone.play().catch(() => {});
    },

    mute(val) { this._muted = val; }
  };

  // Preload all files on page load
  window.addEventListener('DOMContentLoaded', () => {
    SFX.load('beta_wall_hit',   'audio/beta_wall_hit.webm');
    SFX.load('dapto_collect',   'audio/dapto_collect.webm');
    SFX.load('level_complete',  'audio/level_complete.wav');
    SFX.load('vanco_intercept', 'audio/vanco_intercept.webm');
    SFX.load('wall_destroyed',  'audio/wall_destroyed.wav');
    SFX.load('wall_hit',        'audio/wall_hit.wav');
  });
</script>
  <!-- React + ReactDOM via CDN (production builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone so JSX works without a build step -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ── HOOKS (available globally via React CDN) ──────────────────────────────
    const { useState, useEffect, useRef, useCallback } = React;

    // ── URL PARAM: read which drug was selected on the homepage ───────────────
    function getDrugNameFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('drug') || null;
    }
  </script>

  <!--
    InfusionArcade.js is the single source of truth for the game.
    Edit only that file — game.html just loads and mounts it.

    Note: Babel processes both script blocks as a combined bundle,
    so the hooks declared above are available inside InfusionArcade.js.
    Both scripts must be type="text/babel" for this to work.
  -->
  <script type="text/babel" src="InfusionArcade.js"></script>

  <script type="text/babel">
    // ── MOUNT ─────────────────────────────────────────────────────────────────
    function App() {
      const drugName = getDrugNameFromURL();
      return <InfusionArcade initialDrug={drugName} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
