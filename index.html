<head>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C34V4019DW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-C34V4019DW');
  </script>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon-192x192.png" type="image/png" sizes="192x192" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dosecraft" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #0a1628; }
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #root { min-height: 100vh; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="clinicConfig.js"></script>
  <script src="dosecraftAnalytics.js"></script>
  <script src="drugCatalog.js"></script>
  <script src="companionClinicalContent.js"></script>
  <script src="homeInfusionCopy.js"></script>
  <script src="homeInfusionStore.js"></script>
  <script src="icsExport.js"></script>
  <script type="text/babel" src="careTeamContact.js"></script>
  <script type="text/babel" src="homeInfusionApp.js"></script>

  <script type="text/babel">
    function IndexApp() {
      var STORE = window.DOSECRAFT_HOME_STORE;
      var isModule = window.DOSECRAFT_isModuleEnabled;
      if (!isModule("homeInfusion")) {
        if (isModule("clinicInfusion")) {
          window.location.replace("game.html");
          return null;
        }
      }
      if (STORE.isExperiencePickerRequested()) {
        return <HomeModeSelector switchOnly />;
      }
      var dest = STORE.getLaunchDestination();
      if (dest === "picker") {
        return <HomeModeSelector />;
      }
      if (dest === "clinic" && isModule("clinicInfusion")) {
        window.location.replace("game.html");
        return null;
      }
      return <HomeInfusionApp />;
    }

    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<IndexApp />);
  </script>

  <script>
    function dosecraftShouldRegisterServiceWorker() {
      var host = window.location.hostname;
      return host !== "localhost" && host !== "127.0.0.1";
    }
    if ("serviceWorker" in navigator && dosecraftShouldRegisterServiceWorker()) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js", { scope: "/" }).catch(function () {});
      });
    }
  </script>
</body>
</html>
