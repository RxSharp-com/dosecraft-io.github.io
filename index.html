<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>Dosecraft · Infusion Arcade</title>

  <link rel="manifest" href="/manifest.json" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Infusion Arcade" />
  <link rel="apple-touch-icon" href="/icon-192x192.png" />

  <meta name="theme-color" content="#000000" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(ellipse at 30% 20%, #0a1a1a 0%, #060a14 40%, #070414 100%);
      color: #f0f4ff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }

    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes letterBob { from { transform: translateY(0px); } to { transform: translateY(-6px); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes sideGlow { 0%,100% { opacity: 0.25; } 50% { opacity: 0.55; } }

    .ticker-inner { display: flex; white-space: nowrap; animation: ticker 50s linear infinite; }
    .ticker-text { font-size: 12px; letter-spacing: 2px; color: #00d4c8; text-transform: uppercase; padding-right: 80px; }

    .phase { animation: fadeUp 0.35s ease both; }

    .drug-btn {
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 13px 15px;
      cursor: pointer;
      text-align: left;
      font-family: 'Courier New', Courier, monospace;
      width: 100%;
      color: #fff;
      transition: all 0.12s ease;
    }

    .drug-btn:hover {
      transform: translateY(-2px);
    }

    .back-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.35);
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
    }

    .back-btn:hover {
      color: rgba(255,255,255,0.6);
      border-color: rgba(255,255,255,0.3);
    }

    #crt {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
    }

    #side-l, #side-r {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, transparent, #00d4c8, #c084fc, #f59e0b, transparent);
      pointer-events: none;
      z-index: 10;
      animation: sideGlow 3s ease-in-out infinite;
    }

    #side-l { left: 0; }
    #side-r { right: 0; animation-delay: 1.5s; }
  </style>
</head>

<body>

<div id="crt"></div>
<div id="side-l"></div>
<div id="side-r"></div>

<!-- Ticker -->
<div style="border-top:2px solid #00d4c8;border-bottom:2px solid #00d4c8;background:#000;overflow:hidden;height:36px;display:flex;align-items:center;">
  <div class="ticker-inner">
    <span class="ticker-text">
      INSERT COIN TO BEGIN ✦ ZOSYN BATTLES BACTERIA ✦ VANCOMYCIN BLOCKS CONSTRUCTION ✦ IVIG REINFORCES YOUR IMMUNITY ✦
    </span>
    <span class="ticker-text">
      INSERT COIN TO BEGIN ✦ ZOSYN BATTLES BACTERIA ✦ VANCOMYCIN BLOCKS CONSTRUCTION ✦ IVIG REINFORCES YOUR IMMUNITY ✦
    </span>
  </div>
</div>

<!-- Logo -->
<div style="text-align:center;padding:40px 24px 16px;">
  <div id="logo" style="font-size:clamp(34px,9vw,68px);font-weight:900;letter-spacing:0.15em;"></div>
  <div style="font-size:12px;letter-spacing:0.45em;color:rgba(255,255,255,0.32);text-transform:uppercase;margin-top:8px;">
    INFUSION ARCADE
  </div>
</div>

<div id="app"></div>

<script>
const DRUGS = [
  { name:"Zosyn", color:"#00d4c8", group:"Penicillin", generic:"Piperacillin-Tazobactam", mode:"WALL BREAKER", tagline:"Breach the wall" },
  { name:"Ancef", color:"#4f8ef7", group:"Cephalosporin", generic:"Cefazolin", mode:"WALL BREAKER", tagline:"Demolish defenses" },
  { name:"Vancomycin", color:"#c084fc", group:"Vancomycin", generic:"Vancomycin", mode:"BLOCK ATTACK", tagline:"Block construction" },
];

const GROUPS = [
  { label:"Penicillin", color:"#00d4c8" },
  { label:"Cephalosporin", color:"#6366f1" },
  { label:"Vancomycin", color:"#c084fc" }
];

// Logo
(function () {
  const el = document.getElementById('logo');
  const colors = ['#00d4c8','#c084fc','#f59e0b'];

  "DOSECRAFT".split('').forEach((l,i) => {
    const s = document.createElement('span');
    s.textContent = l;
    s.style.color = colors[i % colors.length];
    s.style.display = "inline-block";
    s.style.animation = `letterBob ${1.2+i*0.1}s ease-in-out ${i*0.07}s infinite alternate`;
    el.appendChild(s);
  });
})();

function goToGame(drugName) {
  window.location.href = 'game.html?drug=' + encodeURIComponent(drugName);
}

function render(phase) {
  const app = document.getElementById('app');
  const div = document.createElement('div');
  div.className = 'phase';
  div.innerHTML = phase === 'attract' ? attractHTML() : selectHTML();
  app.innerHTML = '';
  app.appendChild(div);
}

function attractHTML() {
  return `
    <div style="text-align:center;padding:60px 20px;">
      <span onclick="render('select')" style="cursor:pointer;color:#f59e0b;font-size:18px;">
        ▶ SELECT YOUR MEDICATION ◀
      </span>
    </div>
  `;
}

function selectHTML() {
  const groups = GROUPS.map(grp => {
    const drugs = DRUGS.filter(d => d.group === grp.label);
    if (!drugs.length) return '';

    const cards = drugs.map(d => `
      <button class="drug-btn" data-drug="${d.name}" style="border:1px solid ${d.color}">
        <div style="font-weight:bold;color:${d.color}">${d.name}</div>
        <div style="font-size:10px;opacity:0.6">${d.generic}</div>
      </button>
    `).join('');

    return `
      <div style="margin-top:20px;color:${grp.color}">${grp.label}</div>
      <div>${cards}</div>
    `;
  }).join('');

  return `
    <div style="text-align:center;padding:20px;">Select Medication</div>
    <div style="max-width:500px;margin:auto">${groups}</div>
    <div style="text-align:center;margin-top:20px;">
      <button class="back-btn" onclick="render('attract')">Back</button>
    </div>
  `;
}

// Safari-safe click handler (IMPORTANT FIX)
document.addEventListener('click', function (e) {
  const btn = e.target.closest('.drug-btn');
  if (!btn) return;

  const drug = btn.getAttribute('data-drug');
  if (drug) goToGame(drug);
});

render('attract');
</script>

</body>
</html>
